<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Trial - SJ's Collection Hub</title>
  <link rel="stylesheet" href="style.css" />
  <link rel="icon" type="image/png" href="logo.png" />
</head>
<body>
  <nav class="navbar">
    <div class="nav-container">
      <div class="logo">SJ's Collection Hub</div>
      <ul class="nav-menu">
        <li><a href="index.html">MORE ACCESS</a></li>
        <li><a href="list.html">MORE LIST</a></li>
        <li><a href="trial.html" class="active">TRIAL</a></li>
      </ul>
    </div>
  </nav>

  <section class="content">
    <div class="container">
      <h2 class="section-title">Free Trial</h2>
      <div class="grid trial-grid" id="trialGrid"></div>
    </div>
  </section>

  <div id="trialModal" class="modal" style="display:none;">
    <div class="trial-modal-box">
      <button class="close-btn" onclick="closeTrialModal()">×</button>
      <div class="trial-layout">
        <img id="trialPicture" class="trial-image" alt="Trial" />
        <div>
          <h2 id="trialTitle"></h2>
          <p id="trialDescription"></p>
          <div class="warning">
            <strong>⚠ TRIAL VERSION</strong>
            <p id="trialWarning"></p>
          </div>
          <div class="row-btns">
            <button class="primary-btn" onclick="playTrialVideo()">Play Video</button>
            <a id="buyTrialBtn" class="buy-btn" target="_blank">Buy Now</a>
          </div>
        </div>
      </div>
    </div>
  </div>

  <footer class="footer"><p>&copy; 2026 SJ's Collection Hub</p></footer>
  <script src="app.js"></script>
</body>
</html>
